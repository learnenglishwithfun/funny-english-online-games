<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino River Escape 3D - Jurassic Nouns</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background-color: #051405;
            user-select: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 20px;
        }

        .hud-element {
            pointer-events: auto;
            background: rgba(10, 30, 10, 0.9);
            border: 3px solid #3ba83b;
            box-shadow: 0 0 15px rgba(59, 168, 59, 0.5);
            color: #4af24a;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.3rem;
        }

        #top-hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        #game-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        #word-billboard {
            pointer-events: auto;
            background: linear-gradient(135deg, #132d13, #081a08);
            border: 4px solid #ebd036;
            box-shadow: 0 0 25px rgba(235, 208, 54, 0.6);
            color: #ffffff;
            font-size: 3rem;
            padding: 20px 60px;
            border-radius: 15px;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            transform: scale(1);
            transition: transform 0.2s;
        }

        .controls-container {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
        }

        .game-btn {
            pointer-events: auto;
            flex: 1;
            font-size: 2rem;
            font-weight: bold;
            padding: 20px;
            border: 4px solid;
            border-radius: 12px;
            cursor: pointer;
            text-shadow: 1px 1px 2px black;
            box-shadow: 0 8px 0 rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .game-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.4);
        }

        #btn-noun {
            background: #22c55e;
            color: white;
            border-color: #15803d;
        }

        #btn-verb {
            background: #ef4444;
            color: white;
            border-color: #b91c1c;
        }

        .modal-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 15, 4, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #4af24a;
            text-align: center;
        }

        .modal-screen h1 {
            font-size: 3.5rem;
            color: #ebd036;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(235,208,54,0.4);
            padding: 0 10px;
        }

        .modal-screen p {
            font-size: 1.4rem;
            max-width: 600px;
            margin-bottom: 30px;
            line-height: 1.6;
            padding: 0 20px;
        }

        .start-btn {
            background: #ebd036;
            color: #1c1c1c;
            border: none;
            padding: 15px 50px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 5px 0 #b09b23;
            pointer-events: auto;
        }

        .start-btn:hover { background: #fbe662; }
        .hidden { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="start-screen" class="modal-screen">
        <h1>🦖 JURASSIC RIVER ESCAPE</h1>
        <p>Help the dinosaur cross the river safely! Click <b>NOUN</b> to leap forward onto a safe wooden plank. Don't click a <b>VERB</b>, or you will get trapped in the wild waters!</p>
        <button class="start-btn" id="real-start-button" onclick="startGameSession()">START ADVENTURE</button>
    </div>

    <div id="end-screen" class="modal-screen hidden">
        <h1 id="end-title">GAME OVER</h1>
        <p id="end-body">The timer ran out!</p>
        <button class="start-btn" onclick="location.reload()">PLAY AGAIN 🔄</button>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="top-hud">
            <div class="hud-element" id="timer-hud">⏱️ TIME: 45s</div>
            <div class="hud-element" id="score-hud">🪵 PLANKS PASSED: 0/20</div>
        </div>

        <div id="game-center">
            <div id="word-billboard">LOADING...</div>
            <div class="controls-container">
                <button id="btn-noun" class="game-btn" onclick="processAnswer('noun')">NOUN</button>
                <button id="btn-verb" class="game-btn" onclick="processAnswer('verb')">VERB</button>
            </div>
        </div>
    </div>

<script>
    // --- Vocabulary Database ---
    const gameDatabase = [
        { word: "T-Rex", type: "noun" }, { word: "Run", type: "verb" },
        { word: "Island", type: "noun" }, { word: "Roar", type: "verb" },
        { word: "Volcano", type: "noun" }, { word: "Chomp", type: "verb" },
        { word: "Egg", type: "noun" }, { word: "Fly", type: "verb" },
        { word: "Jungle", type: "noun" }, { word: "Hide", type: "verb" },
        { word: "Fossil", type: "noun" }, { word: "Swim", type: "verb" },
        { word: "Tree", type: "noun" }, { word: "Stomp", type: "verb" },
        { word: "Ranger", type: "noun" }, { word: "Hunt", type: "verb" },
        { word: "Leaf", type: "noun" }, { word: "Sleep", type: "verb" },
        { word: "Water", type: "noun" }, { word: "Climb", type: "verb" }
    ];

    let gameItems = [];
    let currentStep = 0;
    let timeLeft = 45;
    let timerInterval = null;
    let audioCtx = null;
    let gameActive = false;

    // --- 3D Scene Global Hooks ---
    let scene, camera, renderer;
    let dinoMesh, riverMesh;
    let planksArray = [];
    const plankSpacing = 6; 

    // 1. Initialize the 3D graphics immediately behind the loading screen frame
    function setup3DWorld() {
        const container = document.getElementById('canvas-container');
        if (!container) return;
        
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#0b240b'); 
        scene.fog = new THREE.FogExp2('#0b240b', 0.015);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 22, 14);
        camera.lookAt(0, 0, -4);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight('#ffffff', 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight('#ebd036', 1.2);
        sunLight.position.set(10, 30, 20);
        scene.add(sunLight);

        // River Build
        const riverGeo = new THREE.PlaneGeometry(30, 200);
        const riverMat = new THREE.MeshStandardMaterial({ color: '#103a4a', roughness: 0.1, metalness: 0.8 });
        riverMesh = new THREE.Mesh(riverGeo, riverMat);
        riverMesh.rotation.x = -Math.PI / 2;
        riverMesh.position.y = -1;
        scene.add(riverMesh);

        // Banks Build
        const bankGeo = new THREE.BoxGeometry(8, 5, 200);
        const bankMat = new THREE.MeshStandardMaterial({ color: '#143d14', roughness: 0.9 });
        const leftBank = new THREE.Mesh(bankGeo, bankMat); leftBank.position.set(-12, 1, -50); scene.add(leftBank);
        const rightBank = new THREE.Mesh(bankGeo, bankMat); rightBank.position.set(12, 1, -50); scene.add(rightBank);

        // Planks Initialization
        const plankGeo = new THREE.BoxGeometry(5, 0.6, 2.5);
        const plankMat = new THREE.MeshStandardMaterial({ color: '#5c4033', roughness: 0.7 });
        for(let i = 0; i < 22; i++) {
            const plank = new THREE.Mesh(plankGeo, plankMat);
            plank.position.set(0, -0.7, -i * plankSpacing);
            scene.add(plank);
            planksArray.push(plank);
        }

        // Dino Build
        const dinoGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.4, 2.5), new THREE.MeshStandardMaterial({color: '#15803d'}));
        body.position.y = 0.7; dinoGroup.add(body);
        const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1, 1.5), new THREE.MeshStandardMaterial({color: '#16a34a'}));
        head.position.set(0, 1.6, -1); dinoGroup.add(head);
        const tail = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 1.8), new THREE.MeshStandardMaterial({color: '#14532d'}));
        tail.position.set(0, 0.5, 1.8); tail.rotation.x = -0.2; dinoGroup.add(tail);

        dinoMesh = dinoGroup;
        dinoMesh.position.set(0, 0, 0);
        scene.add(dinoMesh);

        window.addEventListener('resize', onWindowResize, false);
        animateEngine();
    }

    // 2. Run when user taps 'Start Adventure'
    function startGameSession() {
        document.getElementById('start-screen').classList.add('hidden');
        gameActive = true;
        
        startAudioLoop();
        gameItems = [...gameDatabase].sort(() => 0.5 - Math.random());
        renderCurrentTurn();

        timerInterval = setInterval(() => {
            if(!gameActive) return;
            timeLeft--;
            document.getElementById('timer-hud').innerText = `⏱️ TIME: ${timeLeft}s`;
            if (timeLeft <= 0) {
                endGame(false, "Time ran out! The volcano erupted!");
            }
        }, 1000);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function renderCurrentTurn() {
        if (currentStep >= gameItems.length) {
            endGame(true, "Incredible! You guided the dinosaur entirely across safely!");
            return;
        }
        document.getElementById('score-hud').innerText = `🪵 PLANKS PASSED: ${currentStep}/${gameItems.length}`;
        document.getElementById('word-billboard').innerText = gameItems[currentStep].word;
    }

    function processAnswer(playerInput) {
        if(!gameActive) return;
        const solution = gameItems[currentStep].type;

        if(playerInput === solution && solution === 'noun') {
            currentStep++;
            animateDinoJump();
            renderCurrentTurn();
        } else {
            animateDinoTrap();
        }
    }

    let targetZ = 0, jumpTime = 0, isJumping = false, isTrapped = false, trapTime = 0;

    function animateDinoJump() {
        targetZ = -currentStep * plankSpacing;
        jumpTime = 0;
        isJumping = true;
        isTrapped = false;
        playTone(300, 0.15); 
    }

    function animateDinoTrap() {
        isTrapped = true;
        trapTime = 0;
        playTone(120, 0.4); 
    }

    function animateEngine() {
        requestAnimationFrame(animateEngine);

        if (riverMesh) {
            riverMesh.material.roughness = 0.1 + Math.sin(Date.now() * 0.002) * 0.02;
        }

        if(isJumping && dinoMesh) {
            jumpTime += 0.08;
            if(jumpTime >= 1.0) {
                dinoMesh.position.z = targetZ;
                dinoMesh.position.y = 0;
                isJumping = false;
            } else {
                dinoMesh.position.z = THREE.MathUtils.lerp(dinoMesh.position.z, targetZ, 0.15);
                dinoMesh.position.y = Math.sin(jumpTime * Math.PI) * 2.5; 
            }
            camera.position.z = dinoMesh.position.z + 14;
        }

        if(isTrapped && dinoMesh && !isJumping) {
            trapTime += 0.05;
            dinoMesh.position.y = -0.5 + Math.sin(trapTime * 5) * 0.2;
            dinoMesh.position.x = Math.sin(trapTime * 10) * 0.3; 
            if(trapTime > 2.5) {
                isTrapped = false;
                dinoMesh.position.y = 0;
                dinoMesh.position.x = 0;
            }
        }
        renderer.render(scene, camera);
    }

    function endGame(isVictory, summaryText) {
        gameActive = false;
        clearInterval(timerInterval);
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('end-title').innerText = isVictory ? "🦖 VICTORY!" : "⚠️ TRAPPED!";
        document.getElementById('end-body').innerText = summaryText;
    }

    function startAudioLoop() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            setInterval(() => {
                if(!isTrapped && gameActive && timeLeft > 0) {
                    playTone(60, 0.1); 
                }
            }, 800);
        } catch(e) { console.log("Audio contexts blocked"); }
    }

    function playTone(freq, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // Trigger 3D canvas compilation as soon as script asset loads
    window.onload = setup3DWorld;
</script>
</body>
</html>
