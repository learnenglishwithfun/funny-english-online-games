<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grammar Island V3 - Jurassic Survival</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

/* BACKGROUND LAYERS */
.sky{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(#061a10,#0b2e1f);
z-index:0;
}

/* FOG */
.fog{
position:absolute;
width:200%;
height:100%;
background:rgba(255,255,255,0.03);
animation:moveFog 20s linear infinite;
z-index:1;
}

@keyframes moveFog{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* JUNGLE TREES */
.trees{
position:absolute;
width:200%;
height:100%;
background:url('https://i.imgur.com/5R2K5Qw.png');
background-size:contain;
opacity:0.2;
animation:moveTrees 30s linear infinite;
z-index:2;
}

@keyframes moveTrees{
0%{transform:translateX(0);}
100%{transform:translateX(-40%);}
}

/* GAME WORLD */
.world{
position:absolute;
width:100%;
height:100%;
z-index:5;
}

/* PATH */
.path{
position:absolute;
bottom:0;
width:200%;
height:200px;
background:linear-gradient(#3b2f2f,#1a1a1a);
animation:movePath 6s linear infinite;
}

@keyframes movePath{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* STONES */
.stone{
position:absolute;
width:120px;
height:60px;
background:#444;
border-radius:10px;
text-align:center;
line-height:60px;
color:white;
font-weight:bold;
}

/* DINO */
.dino{
position:absolute;
bottom:120px;
left:45%;
font-size:90px;
animation:idle 1s infinite;
z-index:10;
}

@keyframes idle{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-5px);}
}

/* UI */
.ui{
position:absolute;
top:10px;
left:10px;
z-index:20;
background:rgba(0,0,0,0.5);
padding:10px;
color:white;
border-radius:10px;
}

.wordBox{
position:absolute;
top:50px;
right:20px;
z-index:20;
background:white;
color:black;
padding:15px;
border-radius:10px;
font-size:25px;
font-weight:bold;
}

button{
padding:15px;
margin:5px;
font-size:16px;
border:none;
cursor:pointer;
border-radius:8px;
}

.noun{background:#3498db;color:white;}
.verb{background:#e74c3c;color:white;}

/* POPUP */
.popup{
position:absolute;
top:40%;
left:40%;
font-size:50px;
display:none;
z-index:30;
}

</style>
</head>

<body>

<div class="sky"></div>
<div class="fog"></div>
<div class="trees"></div>

<div class="world">

<div class="ui">
Score: <span id="score">0</span>
</div>

<div class="wordBox" id="word">START</div>

<button class="noun" onclick="answer('noun')">NOUN</button>
<button class="verb" onclick="answer('verb')">VERB</button>

<div class="dino">🦖</div>

<div class="popup" id="popup">✔</div>

<div class="path"></div>

</div>

<script>

const words = [
{w:"apple",t:"noun"},
{w:"river",t:"noun"},
{w:"book",t:"noun"},
{w:"tiger",t:"noun"},
{w:"school",t:"noun"},
{w:"forest",t:"noun"},
{w:"bridge",t:"noun"},
{w:"mountain",t:"noun"},
{w:"village",t:"noun"},
{w:"stone",t:"noun"},

{w:"run",t:"verb"},
{w:"jump",t:"verb"},
{w:"eat",t:"verb"},
{w:"swim",t:"verb"},
{w:"fly",t:"verb"},
{w:"sleep",t:"verb"},
{w:"talk",t:"verb"},
{w:"write",t:"verb"},
{w:"play",t:"verb"},
{w:"drink",t:"verb"}
];

let i=0;
let score=0;

function load(){
document.getElementById("word").innerText=words[i].w;
}

function sound(ok){
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.type="sine";
o.frequency.value=ok?700:120;
o.connect(ctx.destination);
o.start();
o.stop(ctx.currentTime+0.2);
}

function answer(type){

if(type===words[i].t){
score+=10;
document.getElementById("score").innerText=score;

document.getElementById("popup").innerText="✔ SAFE STEP";
sound(true);

}else{
document.getElementById("popup").innerText="TRAP!";
sound(false);
}

let p=document.getElementById("popup");
p.style.display="block";

setTimeout(()=>{
p.style.display="none";
i++;
if(i<words.length){
load();
}else{
document.getElementById("word").innerText="ESCAPED 🏆";
}
},800);
}

load();

</script>

</body>
</html>
