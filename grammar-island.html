<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grammar Island V2 - Jurassic Escape</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(#0f2e22,#050d0a);
color:white;
overflow:hidden;
}

/* GAME WRAPPER */
.game{
display:flex;
height:100vh;
}

/* LEFT WORLD */
.world{
flex:2;
position:relative;
overflow:hidden;
background:linear-gradient(to bottom,#1d3f2e,#0b1a14);
}

/* 3D ROAD */
.road{
position:absolute;
width:60%;
height:200%;
left:20%;
transform:rotateX(60deg);
transform-origin:bottom;
background:linear-gradient(#3b2f2f,#111);
animation:moveRoad 10s linear infinite;
}

@keyframes moveRoad{
0%{top:0;}
100%{top:-60%;}
}

/* TERRAIN ZONES */
.zone{
position:absolute;
width:100%;
height:33%;
opacity:0.2;
}

.jungle{background:green;top:0;}
.river{background:blue;top:33%;}
.rocks{background:gray;top:66%;}

/* DINO */
.dino{
position:absolute;
bottom:120px;
left:45%;
font-size:70px;
transition:0.4s;
}

/* RIGHT PANEL */
.panel{
flex:1;
background:#0a0f0c;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.word{
font-size:38px;
margin-bottom:20px;
text-transform:uppercase;
}

/* BUTTONS */
.btn{
width:140px;
padding:15px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
font-weight:bold;
}

.noun{background:#2980b9;}
.verb{background:#c0392b;}

/* HUD */
.hud{
position:absolute;
top:10px;
left:10px;
z-index:10;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}

.bar{
width:200px;
height:10px;
background:#333;
margin-top:5px;
border-radius:5px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#2ecc71;
transition:0.3s;
}

/* POPUP */
.popup{
position:absolute;
top:40%;
left:40%;
font-size:40px;
display:none;
}

/* WIN SCREEN */
.win{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:40px;
}

</style>
</head>

<body>

<div class="game">

<!-- WORLD -->
<div class="world">

<div class="hud">
Score: <span id="score">0</span><br>
Level: <span id="level">1</span>
<div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="zone jungle"></div>
<div class="zone river"></div>
<div class="zone rocks"></div>

<div class="road"></div>

<div class="dino" id="dino">🦖</div>
<div class="popup" id="popup">✔</div>

<div class="win" id="win">
🦖 ESCAPED JURASSIC WORLD!<br><br>
YOU WIN 🎉
</div>

</div>

<!-- PANEL -->
<div class="panel">
<div class="word" id="word">START</div>

<button class="btn noun" onclick="answer('noun')">NOUN</button>
<button class="btn verb" onclick="answer('verb')">VERB</button>
</div>

</div>

<script>

/* 30 WORDS */
const words = [
{w:"apple",t:"noun"},
{w:"river",t:"noun"},
{w:"book",t:"noun"},
{w:"school",t:"noun"},
{w:"tiger",t:"noun"},
{w:"forest",t:"noun"},
{w:"bridge",t:"noun"},
{w:"mountain",t:"noun"},
{w:"village",t:"noun"},
{w:"stone",t:"noun"},
{w:"dog",t:"noun"},
{w:"car",t:"noun"},
{w:"tree",t:"noun"},
{w:"house",t:"noun"},
{w:"star",t:"noun"},

{w:"run",t:"verb"},
{w:"jump",t:"verb"},
{w:"eat",t:"verb"},
{w:"swim",t:"verb"},
{w:"fly",t:"verb"},
{w:"sleep",t:"verb"},
{w:"talk",t:"verb"},
{w:"write",t:"verb"},
{w:"play",t:"verb"},
{w:"drink",t:"verb"},
{w:"walk",t:"verb"},
{w:"sing",t:"verb"},
{w:"laugh",t:"verb"},
{w:"cry",t:"verb"},
{w:"drive",t:"verb"}
];

let index=0;
let score=0;
let level=1;

const wordBox=document.getElementById("word");
const dino=document.getElementById("dino");
const popup=document.getElementById("popup");

function load(){
wordBox.innerText=words[index].w;
}

function sound(ok){
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.type="sine";
o.frequency.value=ok?600:120;
o.connect(ctx.destination);
o.start();
o.stop(ctx.currentTime+0.2);
}

function answer(type){

if(type===words[index].t){

score+=10;
document.getElementById("score").innerText=score;

/* MOVE DINO */
dino.style.left=(45+index*2.5)+"%";

/* PROGRESS BAR */
document.getElementById("fill").style.width=(index*3)+"%";

popup.innerText="✔";
popup.style.display="block";
sound(true);

} else {
popup.innerText="TRAPPED!";
popup.style.display="block";
sound(false);
}

setTimeout(()=>{

popup.style.display="none";
index++;

if(index%10===0) level++;
document.getElementById("level").innerText=level;

if(index>=words.length){
document.getElementById("win").style.display="flex";
}else{
load();
}

},800);
}

load();

</script>

</body>
</html>
