<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Grammar Adventure</title>

<style>
body{
margin:0;
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
overflow:hidden;
}

.game-box{
max-width:650px;
margin:40px auto;
background:#111;
border-radius:20px;
padding:20px;
box-shadow:0 0 25px #00ffcc;
}

.title{
font-size:28px;
color:#00ffcc;
font-weight:bold;
}

.word{
font-size:60px;
margin:20px;
color:#ffeb3b;
animation:pop 0.4s ease;
}

@keyframes pop{
0%{transform:scale(0.5);}
100%{transform:scale(1);}
}

.btn{
padding:15px 25px;
margin:10px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
transition:0.2s;
}

.btn:hover{transform:scale(1.05);}

.noun{background:#ff9800;}
.verb{background:#9c27b0;}
.next{background:#00bcd4;}

.scoreboard{
font-size:20px;
margin-top:10px;
}

.timer{
font-size:18px;
color:#ff5252;
margin-top:5px;
}

.result{
font-size:25px;
margin-top:10px;
font-weight:bold;
}

.level{
color:#4caf50;
font-size:18px;
}
</style>
</head>

<body>

<div class="game-box">

<div class="title">🦖 Dino Grammar Adventure</div>

<div class="level">Level: <span id="level">1</span></div>

<div class="timer">⏱ Time: <span id="time">10</span>s</div>

<div class="word" id="word">Loading...</div>

<button class="btn noun" onclick="check('noun')">NOUN</button>
<button class="btn verb" onclick="check('verb')">VERB</button>

<div class="result" id="result"></div>

<div class="scoreboard">
Score: <span id="score">0</span>
</div>

<button class="btn next" onclick="nextWord()">NEXT</button>

</div>

<script>

// ===== WORD LIST =====
const words = [
{w:"Apple",t:"noun"},
{w:"Run",t:"verb"},
{w:"Teacher",t:"noun"},
{w:"Jump",t:"verb"},
{w:"Book",t:"noun"},
{w:"Write",t:"verb"},
{w:"Dog",t:"noun"},
{w:"Swim",t:"verb"}
];

let i = 0;
let score = 0;
let time = 10;
let level = 1;
let timer;

// ===== SOUND =====
function beep(freq){
let ctx = new (window.AudioContext || window.webkitAudioContext)();
let osc = ctx.createOscillator();
let gain = ctx.createGain();

osc.frequency.value = freq;
osc.type = "sine";

gain.gain.value = 0.1;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();
osc.stop(ctx.currentTime + 0.2);
}

// ===== LOAD WORD =====
function load(){
document.getElementById("word").innerText = words[i].w;
document.getElementById("result").innerText = "";
resetTimer();
}

// ===== CHECK ANSWER =====
function check(ans){
if(ans === words[i].t){
score += 10;
document.getElementById("result").innerText = "✔ Correct!";
beep(600);
}else{
document.getElementById("result").innerText = "❌ Wrong!";
beep(200);
}

document.getElementById("score").innerText = score;

if(score % 30 === 0){
levelUp();
}
}

// ===== NEXT WORD =====
function nextWord(){
i++;
if(i >= words.length){
i = 0;
alert("Game Finished! Score: " + score);
score = 0;
level = 1;
}
load();
}

// ===== LEVEL UP =====
function levelUp(){
level++;
document.getElementById("level").innerText = level;
time = Math.max(4, time - 1);
}

// ===== TIMER =====
function resetTimer(){
clearInterval(timer);
time = 10;

timer = setInterval(()=>{
time--;
document.getElementById("time").innerText = time;

if(time <= 0){
clearInterval(timer);
document.getElementById("result").innerText = "⏰ Time Up!";
beep(150);
setTimeout(nextWord,1000);
}
},1000);
}

load();

</script>

</body>
</html>
