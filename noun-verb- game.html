html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Grammar Island - Nouns & Verbs</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', Comic Sans MS, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* The Jungle / Dinosaur Border Container */
        .jungle-framework {
            position: relative;
            width: 95vw;
            height: 92vh;
            max-width: 1100px;
            background: #14251c url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" width="80" height="80" viewBox="0 0 80 80"><path d="M10 50 Q 20 20, 40 50 T 70 50" fill="none" stroke="%231b3527" stroke-width="3"/><circle cx="20" cy="20" r="2" fill="%231b3527"/></svg>');
            border: 15px solid #2e1d0c;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 40px rgba(0,0,0,0.8);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* SVG Dinosaur & Jungle Accents on Borders */
        .border-dino-left {
            position: absolute;
            left: -20px;
            bottom: 20px;
            width: 140px;
            height: 140px;
            transform: scaleX(-1);
            filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.5));
            pointer-events: none;
        }
        .border-dino-right {
            position: absolute;
            right: -20px;
            top: 20px;
            width: 120px;
            height: 120px;
            filter: drop-shadow(-5px 5px 5px rgba(0,0,0,0.5));
            pointer-events: none;
        }

        /* Top HUD Bar */
        .hud-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 25px;
            border-radius: 12px;
            border: 2px solid #3a5f43;
            color: #fff;
            z-index: 10;
        }
        .hud-title {
            margin: 0;
            font-size: 1.6rem;
            color: #ffcc00;
            text-shadow: 2px 2px #000;
            letter-spacing: 1px;
        }
        
        .hud-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .score-box {
            font-size: 1.4rem;
            font-weight: bold;
            background: #27ae60;
            padding: 5px 15px;
            border-radius: 8px;
            box-shadow: 0 4px #1e8449;
            text-shadow: 1px 1px #000;
        }

        .music-btn {
            background: #2980b9;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px #1c5980;
            font-size: 1rem;
        }
        .music-btn:active { transform: translateY(2px); box-shadow: 0 2px #1c5980; }

        /* The Main Center Cage Area */
        .dino-cage {
            flex-grow: 1;
            width: 100%;
            margin: 20px 0;
            background: linear-gradient(to bottom, #2c3e50, #34495e);
            border-radius: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            border: 4px solid #7f8c8d;
        }
        .dino-cage::before, .dino-cage::after {
            content: '';
            position: absolute;
            top: 0; width: 4px; height: 100%;
            background: rgba(231, 76, 60, 0.3);
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
            pointer-events: none;
        }
        .dino-cage::before { left: 25%; }
        .dino-cage::after { right: 25%; }

        /* Graphic Display Window */
        .graphic-display-window {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            z-index: 5;
        }

        .vector-graphic-box {
            width: 180px;
            height: 180px;
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            border: 6px solid #ffcc00;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }
        .vector-graphic-box:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .target-word {
            margin-top: 15px;
            font-size: 2.8rem;
            color: #ffffff;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000;
            letter-spacing: 2px;
        }

        /* Arcade Style Action Buttons Container */
        .action-button-deck {
            width: 100%;
            max-width: 600px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            z-index: 10;
        }

        .action-btn {
            padding: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            box-shadow: 0 10px 0px #111;
            transition: all 0.1s ease;
        }
        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0px #111;
        }
        
        .noun-btn { background: #e67e22; box-shadow: 0 10px 0px #b35e15; border: 3px solid #f39c12; }
        .noun-btn:active { box-shadow: 0 4px 0px #b35e15; }
        
        .verb-btn { background: #9b59b6; box-shadow: 0 10px 0px #763c8c; border: 3px solid #8e44ad; }
        .verb-btn:active { box-shadow: 0 4px 0px #763c8c; }

        /* Large Immersive Modal Popup for Feedback */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 12px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .feedback-title {
            font-size: 3.5rem;
            color: white;
            text-shadow: 4px 4px 0px #000;
            margin-bottom: 10px;
        }
        .feedback-overlay svg {
            width: 120px;
            height: 120px;
            filter: drop-shadow(3px 5px 0px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>

    <div class="jungle-framework">
        <!-- SVG Left Decorative Dinosaur -->
        <svg class="border-dino-left" viewBox="0 0 100 100">
            <path d="M10 90 Q 20 80, 25 50 Q 28 20, 40 10 Q 48 5, 45 15 Q 40 30, 35 50 Q 45 60, 65 65 Q 85 70, 90 90 Z" fill="#2d6a4f"/>
            <circle cx="40" cy="13" r="1.5" fill="#fff"/>

        <!-- SVG Right Decorative Dinosaur -->
        <svg class="border-dino-right" viewBox="0 0 100 100">
            <path d="M90 10 Q 70 15, 60 25 Q 50 35, 40 30 Q 30 25, 25 35 Q 20 45, 35 50 Q 55 55, 60 70 Q 65 85, 80 90 Z" fill="#52b788"/>
            <circle cx="32" cy="35" r="1.5" fill="#fff"/>

        <!-- HUD Header Panel -->
        <div class="hud-header">

            <div class="hud-controls">
                <button class="music-btn" id="music-toggle" onclick="toggleMusic()">🎵 Music: OFF</button>
                <div class="score-box">SCORE: <span id="score-val">0</span></div>

        <!-- Interactive Cage Window -->
        <div class="dino-cage" id="cage-zone">
            <div class="graphic-display-window">
                <div class="vector-graphic-box" id="graphic-container"></div>
                <div class="target-word" id="word-display">APPLE</div>
            </div>

            <!-- Answer Buttons Deck -->
            <div class="action-button-deck">
                <button class="action-btn noun-btn" onclick="submitAnswer('noun')">Noun</button>
                <button class="action-btn verb-btn" onclick="submitAnswer('verb')">Verb</button>
            </div>

            <!-- Immersive Feedback Popup Panel -->
            <div class="feedback-overlay" id="feedback-panel">
                <div class="feedback-title" id="feedback-text">CORRECT!</div>
                <div id="feedback-icon-container"></div>
            </div>
        </div>
    </div>

        // Vocabulary list
        const gameItems = [
            {

                type: "noun",

="M50 50 C 35 20, 30 10, 50 35 C 70 10, 65 20, 50 50" fill="#ecf0f1" opacity="0.7"/><circle cx="82" cy="50" r="4" fill="#000"/></svg>}];const correctIcon = <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="#2ecc71"/></svg>;const incorrectIcon = <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#e74c3c"/></svg>;let currentIndex = 0;let score = 0;// Audio Setup using modern Web Audio API synthesizerlet audioCtx = null;let musicInterval = null;let isMusicPlaying = false;function initAudio() {if (!audioCtx) {audioCtx = new (window.AudioContext || window.webkitAudioContext)();}}// Play individual sound effect notesfunction playTone(freq, type, duration) {initAudio();if (audioCtx.state === 'suspended') audioCtx.resume();let osc = audioCtx.createOscillator();let gain = audioCtx.createGain();osc.type = type;osc.frequency.setValueAtTime(freq, audioCtx.currentTime);gain.gain.setValueAtTime(0.1, audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);osc.connect(gain);gain.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime + duration);}function playCorrectSound() {playTone(523.25, "sine", 0.15); // C5 NotesetTimeout(() => playTone(659.25, "sine", 0.3), 100); // E5 Note}function playWrongSound() {playTone(180, "sawtooth", 0.4); // Deep Low Buzz}// Live synthesizer background track loopfunction startMusicLoop() {let notes =; // Jungle-themed bass looplet step = 0;musicInterval = setInterval(() => {if(step % 2 === 0) {playTone(notes[step % notes.length], "triangle", 0.25);}step++;}, 300);}function toggleMusic() {initAudio();const btn = document.getElementById("music-toggle");if (!isMusicPlaying) {startMusicLoop();isMusicPlaying = true;btn.innerText = "🎵 Music: ON";btn.style.background = "#2ecc71";} else {clearInterval(musicInterval);isMusicPlaying = false;btn.innerText = "🎵 Music: OFF";btn.style.background = "#2980b9";}}function shuffle(array) {for (let i = array.length - 1; i > 0; i--) {const j = Math.floor(Math.random() * (i + 1));[array[i], array[j]] = [array[j], array[i]];}}function loadQuestion() {const currentItem = gameItems[currentIndex];document.getElementById("word-display").innerText = currentItem.word;document.getElementById("graphic-container").innerHTML = currentItem.svg;}function submitAnswer(selectedType) {const currentItem = gameItems[currentIndex];const panel = document.getElementById("feedback-panel");const text = document.getElementById("feedback-text");const iconBox = document.getElementById("feedback-icon-container");if (selectedType === currentItem.type) {score += 10;document.getElementById("score-val").innerText = score;panel.style.backgroundColor = "rgba(39, 174, 96, 0.95)";text.innerText = "CORRECT!";iconBox.innerHTML = correctIcon;playCorrectSound();} else {panel.style.backgroundColor = "rgba(192, 57, 43, 0.95)";text.innerText = "TRY AGAIN!";iconBox.innerHTML = incorrectIcon;playWrongSound();}panel.style.display = "flex";setTimeout(() => {panel.style.display = "none";currentIndex = (currentIndex + 1) % gameItems.length;if(currentIndex === 0) { shuffle(gameItems); }loadQuestion();}, 1400);}shuffle(gameItems);loadQuestion();
